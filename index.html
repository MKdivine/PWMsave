<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eye-Friendly Displays | Amazon Affiliate Picks</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #060913;
        --bg-soft: #0c1222;
        --text: #edf2ff;
        --muted: #b7c1d9;
        --line: #2a3350;
        --accent: #8fb3ff;
        --accent-strong: #6d99ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(1000px 500px at 5% -20%, #1f325f66, transparent 65%), var(--bg);
      }

      .page-bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(700px 450px at 95% 0%, #2e4b8f40, transparent 70%);
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        max-width: 1120px;
        margin: 0 auto;
        padding: 60px 20px 70px;
      }

      .hero {
        margin-bottom: 34px;
      }

      .eyebrow {
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.11em;
        font-weight: 700;
        font-size: 0.78rem;
        margin: 0 0 10px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4.5vw, 3.2rem);
        line-height: 1.1;
      }

      .hero p {
        max-width: 700px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 1.03rem;
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
        gap: 18px;
      }

      .card {
        border: 1px solid #ffffff1f;
        border-radius: 18px;
        overflow: hidden;
        background: linear-gradient(160deg, #0d152a, #09101f);
        box-shadow: 0 24px 55px #00000045;
      }

      .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
      }

      .card-content {
        padding: 18px;
      }

      .meta-row {
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      h2 {
        margin: 0;
        font-size: 1.1rem;
      }

      .chip {
        font-size: 0.75rem;
        color: #dce5ff;
        border: 1px solid #324d80;
        background: #152240;
        border-radius: 999px;
        padding: 5px 10px;
      }

      .description {
        margin: 11px 0 14px;
        color: var(--muted);
        font-size: 0.94rem;
        line-height: 1.55;
      }

      .table-wrap {
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        background: var(--bg-soft);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
        padding: 10px 12px;
        font-size: 0.88rem;
      }

      th {
        color: #d3deff;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        background: #0f1930;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      td:first-child {
        color: #b7ffcb;
      }

      td:last-child {
        color: #ffd3d3;
      }

      .cta {
        margin-top: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: #071128;
        font-weight: 700;
        font-size: 0.9rem;
        border-radius: 10px;
        padding: 10px 14px;
        background: linear-gradient(180deg, #9ebdff, #6e98ff);
      }

      .cta:hover {
        filter: brightness(1.06);
      }

      @media (max-width: 540px) {
        .container {
          padding-top: 38px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="app.js"></script>
  </body>
</html>
